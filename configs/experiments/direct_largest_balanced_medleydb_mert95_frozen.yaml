experiment_id: direct_largest_balanced_medleydb_mert95_frozen
approach: mert_finetune
notes: Direct-audio frozen MERT-v1-95M baseline using the largest-balanced MedleyDB
  instrument subset; no embedding cache is used.
seed: 42
data:
  subset_profile: largest_balanced
  label_granularity: medleydb_instrument
  subset_csv: data/metadata/subset_largest_balanced_medleydb_instrument.csv
  label_to_id: data/metadata/labels_largest_balanced_medleydb_instrument_label_to_id.json
  cache_dir: NA
  medleydb_root: MedleyDB
  batch_size: 1
  num_workers: 0
  sampler: shuffle
  subset_strategy: balanced
model:
  model_name: m-a-p/MERT-v1-95M
  model_revision: main
  classifier_type: mlp
  hidden_dim: 256
  dropout: 0.2
  unfreeze_mode: frozen
  allow_full_finetune: false
representation:
  layer: last
  pooling: mean
training:
  head_learning_rate: 0.001
  backbone_learning_rate: 1.0e-05
  weight_decay: 0.0001
  max_epochs: 20
  early_stopping_patience: 5
  accelerator: auto
  devices: 1
  precision: 16-mixed
  deterministic: true
  accumulate_grad_batches: 8
  gradient_checkpointing: true
  loss_weighting: none
output:
  registry_path: results/experiment_registry.csv
